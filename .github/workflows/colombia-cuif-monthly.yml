name: Colombia CUIF (Socrata monthly)

on:
  schedule:
    # Día 5 de cada mes, 12:00 UTC (~7–8 am Colombia según DST)
    - cron: '0 12 5 * *'
  workflow_dispatch: {}

jobs:
  incremental:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Load Colombia CUIF (incremental)
        env:
          COCKROACH_URL: ${{ secrets.COCKROACH_URL }}
        run: python colombia_loader.py --incremental
